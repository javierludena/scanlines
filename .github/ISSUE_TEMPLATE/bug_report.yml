name: Bug report
description: Report a problem with Scanlines.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem.
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: The Scanlines app version, if known.
      placeholder: "Example: 0.1.0"
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Web
        - iOS
        - Other
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "Example: Pixel 8"
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "Example: Android 15"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots/logs
      description: Add screenshots or logs if they help explain the issue.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help.
